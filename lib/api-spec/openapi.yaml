openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: IT Training Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: members
    description: Team member operations
  - name: topics
    description: IT curriculum topic operations
  - name: progress
    description: Progress tracking operations
  - name: stats
    description: Dashboard stats operations
  - name: quiz
    description: AI quiz operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all team members
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Add a new team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberInput"
      responses:
        "201":
          description: Created member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get a specific member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Not found
    delete:
      operationId: deleteMember
      tags: [members]
      summary: Remove a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /topics:
    get:
      operationId: listTopics
      tags: [topics]
      summary: Get full IT curriculum topics
      parameters:
        - name: phase
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  /progress/{memberId}:
    get:
      operationId: getMemberProgress
      tags: [progress]
      summary: Get all progress for a member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of completed topic IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Progress"

  /progress:
    post:
      operationId: markComplete
      tags: [progress]
      summary: Mark a topic as complete for a member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressInput"
      responses:
        "201":
          description: Progress recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  /progress/{memberId}/{topicId}:
    delete:
      operationId: unmarkComplete
      tags: [progress]
      summary: Unmark a topic as complete
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
        - name: topicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get overall dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/member/{memberId}:
    get:
      operationId: getMemberStats
      tags: [stats]
      summary: Get stats for a specific member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberStats"

  /quiz/generate/{topicId}:
    get:
      operationId: generateQuiz
      tags: [quiz]
      summary: Generate AI quiz questions for a topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quiz questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizQuestionsPayload"

  /quiz/submit:
    post:
      operationId: submitQuiz
      tags: [quiz]
      summary: Submit quiz answers and get result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizAnswerSubmission"
      responses:
        "200":
          description: Quiz result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  /quiz/status/{memberId}/{topicId}:
    get:
      operationId: getQuizStatus
      tags: [quiz]
      summary: Get quiz pass/fail status for a member+topic
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
        - name: topicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quiz status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizStatus"

  /quiz/member/{memberId}:
    get:
      operationId: getMemberQuizStatuses
      tags: [quiz]
      summary: Get all quiz statuses for a member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All quiz statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - createdAt

    MemberInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: string
      required:
        - name

    Topic:
      type: object
      properties:
        id:
          type: string
        phase:
          type: string
        category:
          type: string
        title:
          type: string
        description:
          type: string
        level:
          type: string
          enum: [beginner, intermediate, advanced]
        order:
          type: integer
      required:
        - id
        - phase
        - category
        - title
        - description
        - level
        - order

    Progress:
      type: object
      properties:
        id:
          type: integer
        memberId:
          type: integer
        topicId:
          type: string
        completedAt:
          type: string
      required:
        - id
        - memberId
        - topicId
        - completedAt

    ProgressInput:
      type: object
      properties:
        memberId:
          type: integer
        topicId:
          type: string
      required:
        - memberId
        - topicId

    DashboardStats:
      type: object
      properties:
        totalMembers:
          type: integer
        totalTopics:
          type: integer
        totalCompletions:
          type: integer
        avgCompletionPercent:
          type: number
        topPerformer:
          type: ["string", "null"]
        phaseBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/PhaseBreakdown"
      required:
        - totalMembers
        - totalTopics
        - totalCompletions
        - avgCompletionPercent
        - phaseBreakdown

    PhaseBreakdown:
      type: object
      properties:
        phase:
          type: string
        totalTopics:
          type: integer
        avgCompleted:
          type: number
      required:
        - phase
        - totalTopics
        - avgCompleted

    MemberStats:
      type: object
      properties:
        memberId:
          type: integer
        memberName:
          type: string
        totalCompleted:
          type: integer
        totalTopics:
          type: integer
        completionPercent:
          type: number
        byPhase:
          type: array
          items:
            $ref: "#/components/schemas/PhaseProgress"
      required:
        - memberId
        - memberName
        - totalCompleted
        - totalTopics
        - completionPercent
        - byPhase

    PhaseProgress:
      type: object
      properties:
        phase:
          type: string
        completed:
          type: integer
        total:
          type: integer
      required:
        - phase
        - completed
        - total

    QuizQuestion:
      type: object
      properties:
        index:
          type: integer
        question:
          type: string
        options:
          type: array
          items:
            type: string
      required:
        - index
        - question
        - options

    QuizQuestionsPayload:
      type: object
      properties:
        topicId:
          type: string
        topicTitle:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      required:
        - topicId
        - topicTitle
        - questions

    QuizAnswerSubmission:
      type: object
      properties:
        memberId:
          type: integer
        topicId:
          type: string
        answers:
          type: array
          items:
            type: integer
      required:
        - memberId
        - topicId
        - answers

    QuizResult:
      type: object
      properties:
        passed:
          type: boolean
        score:
          type: integer
        totalQuestions:
          type: integer
        percentScore:
          type: number
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/QuizFeedbackItem"
      required:
        - passed
        - score
        - totalQuestions
        - percentScore
        - feedback

    QuizFeedbackItem:
      type: object
      properties:
        questionIndex:
          type: integer
        correct:
          type: boolean
        correctOption:
          type: integer
        explanation:
          type: string
      required:
        - questionIndex
        - correct
        - correctOption
        - explanation

    QuizStatus:
      type: object
      properties:
        memberId:
          type: integer
        topicId:
          type: string
        passed:
          type: boolean
        bestScore:
          type: integer
        attempts:
          type: integer
      required:
        - memberId
        - topicId
        - passed
        - bestScore
        - attempts
