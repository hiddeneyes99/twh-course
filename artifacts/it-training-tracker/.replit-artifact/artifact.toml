kind = "web"
previewPath = "/"
title = "IT Training Tracker"
version = "1.0.0"
id = "artifacts/it-training-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20104

[services.development]
run = "pnpm --filter @workspace/it-training-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/it-training-tracker", "run", "build" ]
publicDir = "artifacts/it-training-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20104"
BASE_PATH = "/"
